steps:

# Step 1: List all images currently in the repository and calculate the next semver tag
- name: 'sonarsource/sonar-scanner-cli:latest'
  id: 'SonarQube analysis'
  entrypoint: 'bash'
  secretEnv: ['_SONAR_TOKEN']
  args:
    - '-c'
    - |
      set -e

      echo "----------------------------------------------------------------------------------------------------------"
      echo "Running SonarQube analysis"
      echo "----------------------------------------------------------------------------------------------------------"

      sonar-scanner \
        -Dsonar.projectKey=${_SONAR_PROJECT_KEY} \
        -Dsonar.organization=${_SONAR_ORGANIZATION} \
        -Dsonar.sources=app \
        -Dsonar.host.url=${_SONAR_HOST_URL} \
        -Dsonar.login=$$_SONAR_TOKEN

- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  id: 'Fetch repository images'
  entrypoint: 'bash'
  args:
    - '-c'
    - |
      set -e

      echo "----------------------------------------------------------------------------------------------------------"
      echo "Listing all images in the repository"
      echo "----------------------------------------------------------------------------------------------------------"

      # 1. List all images and tags in the repository and save to files
      gcloud artifacts docker images list ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY} \
        --format="value(format('{0}@{1}', package, version))" > /workspace/repo_image_list.txt

      gcloud artifacts docker tags list ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE} \
        --format="value(tag)" > /workspace/repo_image_tags.txt
      
      # 2. Load Repository image references and tags into variables for later use
      repo_image_list=$$(cat /workspace/repo_image_list.txt 2>/dev/null)
      repo_image_tag=$$(cat /workspace/repo_image_tags.txt 2>/dev/null)

      if [ -z "$$repo_image_list" ]; then
        echo "Images not found in the repository. This is the first image to build and push."
      else
        echo "Found images in the repository:"
        echo "List of images is: $$repo_image_list"        
      fi
    
      # 3. Handle Semantic Versioning calculation
      if [ -z "$$repo_image_tag" ]; then
          echo "Tag file is empty or missing."
          echo "v1.0.1" > /workspace/tag.txt
          echo "This is the first image to build with tag: v1.0.1"
      else
          # Filter for tags that specifically match the vX.Y.Z semver format
          latest_tag=$$(echo "$$repo_image_tag" \
            | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$$' \
            | sed 's/^v//' \
            | sort -V \
            | tail -n 1)

          # Fallback if tags exist but none match vX.Y.Z
          if [ -z "$$latest_tag" ]; then
              echo "No valid semver tags found. Starting chain at v1.0.1"
              echo "v1.0.1" > /workspace/tag.txt
          else
              echo "Latest semantic tag found: v$$latest_tag"
              
              IFS='.' read -r major minor patch <<< "$$latest_tag"

              # Safely increment the patch number
              next_patch=$$(($$patch + 1))
              updated_tag="v$${major}.$${minor}.$${next_patch}"

              echo "Updated tag: $$updated_tag"
              echo "$$updated_tag" > /workspace/tag.txt
          fi
      fi

# Step 2: Build the image and save to a tarball (no push)
- name: 'gcr.io/kaniko-project/executor:debug'
  id: 'Build Docker image'
  entrypoint: 'sh'
  args:
    - '-c'
    - |
      echo "----------------------------------------------------------------------------------------------------------"
      echo "Building the image with Kaniko and saving to tarball (no push)"
      echo "----------------------------------------------------------------------------------------------------------"
      TAG=$$(cat /workspace/tag.txt)

      BUILD_DATE=$$(date -u +"%Y-%m-%dT%H:%M:%SZ")

      /kaniko/executor --context=dir://app \
        --no-push \
        --tar-path=/workspace/image.tar \
        --destination=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE}:$$TAG \
        --cache=true \
        --cache-ttl=168h \
        --cache-repo=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/cache \
        --reproducible=true \
        --label=build-date=$$BUILD_DATE 

# Step 3: Load image into Docker, extract RootFS layers, run tests
- name: 'gcr.io/cloud-builders/docker'
  id: 'Load & inspect Docker image'
  entrypoint: 'bash'
  args:
    - '-c'
    - |
      set -e

      TAG=$$(cat /workspace/tag.txt)

      echo "----------------------------------------------------------------------------------------------------------"
      echo "Loading the built image from tarball into Docker"
      echo "----------------------------------------------------------------------------------------------------------"
      docker load -i /workspace/image.tar

      apt-get update -qq && apt-get install -y -qq jq

      echo "Inspect the loaded image: ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE}:$$TAG"

      docker inspect ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE}:$$TAG

      echo "Inspecting the loaded image to extract RootFS layers and save to file"

      docker inspect ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE}:$$TAG \
        | jq -r '.[] | .RootFS.Layers | join(" ")' > /workspace/new_rootfs.txt

      echo "New image RootFS layers:"
      cat /workspace/new_rootfs.txt

# Step 4: Extract RootFS layers of existing repository images using crane
- name: 'gcr.io/go-containerregistry/crane:debug'
  id: 'Inspect RootFS layers of repository images'
  entrypoint: 'sh'
  args:
    - '-c'
    - |
      set -e

      echo "----------------------------------------------------------------------------------------------------------"
      echo "Extracting RootFS layers of repository images"
      echo "----------------------------------------------------------------------------------------------------------"
            
      touch /workspace/repo_rootfs.txt

      if [ ! -s /workspace/repo_image_list.txt ]; then
        echo "repo_image_list.txt is empty. Skipping layer extraction."
      else
        while IFS= read -r image_ref; do
          [ -z "$$image_ref" ] && continue

          echo "Inspecting image: $$image_ref"

          raw=$$(crane config "$$image_ref") || {
            echo "WARNING: crane config failed for $$image_ref" >&2
            continue
          }

          layers=$$(echo "$$raw" \
            | grep -o '"diff_ids":\[[^]]*\]' \
            | grep -o '"sha256:[a-f0-9]*"' \
            | tr -d '"' \
            | tr '\n' ' ' \
            | xargs)

          if [ -z "$$layers" ]; then
            echo "WARNING: No layers found for $$image_ref" >&2
            continue
          fi

          echo "  -> Layers: $$layers"
          echo "$$layers" >> /workspace/repo_rootfs.txt

        done < /workspace/repo_image_list.txt

        echo "RootFS layers of repository images:"
        cat /workspace/repo_rootfs.txt
      fi

# Step 5: Compare RootFS layers and conditionally push
- name: 'gcr.io/cloud-builders/docker'
  id: 'Conditional push'
  entrypoint: 'bash'
  args:
    - '-c'
    - |
      set -e

      echo "----------------------------------------------------------------------------------------------------------"
      echo "Comparing RootFS layers of new image with existing repository images"
      echo "----------------------------------------------------------------------------------------------------------"

      # Load variables

      NEW_TAG=$$(cat /workspace/tag.txt)
      NEW_ROOTFS=$$(cat /workspace/new_rootfs.txt)
      REPO_ROOTFS="/workspace/repo_rootfs.txt"
      FULL_IMAGE_NAME="${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_IMAGE}:$$NEW_TAG"
      
      # 1. Validate that the new RootFS data is not empty before proceeding
      if [[ -z "$$NEW_ROOTFS" ]]; then
        echo "ERROR: $$FULL_IMAGE_NAME has an empty RootFS or may be not built." >&2
        exit 1
      fi

      if [[ ! -s "$$REPO_ROOTFS" ]]; then
        echo "WARNING: repo_rootfs.txt is empty or missing. No existing images to compare against." >&2
        echo "Proceeding to push the new image without comparison."
        docker push "$$FULL_IMAGE_NAME"
        exit 0
      fi
      
      # 2. Compare the full layer chain as a single exact line against the repo history
      if grep -Fxq "$$NEW_ROOTFS" "$$REPO_ROOTFS"; then
        echo "MATCH FOUND: An image with this exact layer combination already exists."
        echo "Action: Skipping push for $$NEW_TAG."
      else
        echo "NO MATCH: Unique layer combination detected."
        echo "Action: Pushing $$FULL_IMAGE_NAME"

        docker push "$$FULL_IMAGE_NAME"
      fi

