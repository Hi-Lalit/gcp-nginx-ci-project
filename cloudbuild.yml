substitutions:
  _REGION: 'us-east1'
  _REPOSITORY: 'docker-repo'
  _IMAGE: 'nginx-app'
  _TAG: 'v1.01'
  _LOG_BUCKET: 'devops_ci_logs'

steps:
# 1. BUILD ONLY
- name: 'gcr.io/kaniko-project/executor:latest'
  id: 'build-to-tar'
  args:
    - --context=dir://app
    - --no-push
    - --tar-path=/workspace/image.tar
    - --digest-file=/workspace/digest.txt
    - --reproducible=true
    - --cache=true

# 2. CHECK & PUSH (Completely fixed image name below)
- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:latest'
  id: 'conditional-push'
  entrypoint: 'bash'
  args:
    - '-c'
    - |
      # Use double dollar signs for bash variables
      DIGEST=$$(cat /workspace/digest.txt)
      IMAGE_BASE="${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE}"
      
      echo "Checking if digest $$DIGEST exists in registry..."
      
      EXISTS=$$(gcloud artifacts docker images list $$IMAGE_BASE --filter="version=$$DIGEST" --format="value(version)")
      
      if [ "$$EXISTS" == "$$DIGEST" ]; then
        echo ">>> Image content already exists. Skipping push."
      else
        echo ">>> New content detected. Pushing image..."
        /kaniko/executor --context=tar:///workspace/image.tar --destination=$$IMAGE_BASE:${_TAG}
      fi

# 3. LIST IMAGES (Fixed image name here too)
- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:latest'
  id: 'list-all-images'
  args: ['gcloud', 'artifacts', 'docker', 'images', 'list', '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE}', '--include-tags']

logsBucket: 'gs://${_LOG_BUCKET}'
