steps:

#  Check Image exists or not in Artifact Registry

- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  id: 'check-image'
  entrypoint: 'bash'
  args:
  - '-c'
  - |
    FULL_PATH='${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE}:${_TAG}'

    if gcloud artifacts docker images describe "$$FULL_PATH" >/dev/null 2>&1; then
      echo "Image '$$FULL_PATH' already exists in Artifact Registry."
      exit 0
    else
      echo "Image '$$FULL_PATH' does not exist in Artifact Registry."
      exit 1
    fi


# Build the Docker image

- name: 'gcr.io/cloud-builders/docker'
  id: 'build-image'
  waitFor: ['check-image']
  dir: 'app'
  args: 
  - 'build'
  - '-t'
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE}:${_TAG}'
  - '.'

# Push the Docker image to Artifact Registry

- name: 'gcr.io/cloud-builders/docker'
  id: 'push-image'
  waitFor: ['build-image']
  args: 
  - 'push'
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE}:${_TAG}'

# Test the image by running it

- name: 'gcr.io/cloud-builders/docker'
  args: 
  - 'run'
  - '--rm'
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE}:${_TAG}'
  - 'sh'
  - '-c'
  - 'echo "Hostname is: $$(hostname)"'

logsBucket: 'gs://${_LOG_BUCKET}'

substitutions:
  _REGION: 'us-east1'
  _REPOSITORY: 'docker-repo'
  _IMAGE: 'nginx-app'
  _TAG: 'v1.02'
  _LOG_BUCKET: 'devops_ci_logs'