substitutions:
  _REGION: 'us-east1'
  _REPOSITORY: 'docker-repo'
  _IMAGE: 'nginx-app'
  _TAG: 'v1.07'
  _LOG_BUCKET: 'devops_ci_logs'

steps:

  # Step 1: Build the image and save to a tarball (no push)
  - name: 'gcr.io/kaniko-project/executor:latest'
    id: 'build-only'
    args:
      - --context=dir://app
      - --no-push
      - --tar-path=/workspace/image.tar
      - --destination=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE}:${_TAG}
      - --cache=true
      - --cache-ttl=168h
      - --cache-repo=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/cache
      - --reproducible=true

  # Step 2: Load image into Docker daemon and extract clean sorted layers
  - name: 'gcr.io/cloud-builders/docker'
    id: 'load-image'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -e
        # Load the image archive
        LOAD_OUTPUT=$(docker load -i /workspace/image.tar)
        echo "$$LOAD_OUTPUT"
        
        # Tag the image cleanly so Docker daemon knows exactly what it is referencing
        docker tag ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE}:${_TAG} latest-local-build:test
        
        # FIXED: Removed 'tr' translation block. Keeps this as a true clean multi-line array.
        docker inspect latest-local-build:test \
          --format='{{range .RootFS.Layers}}{{.}}{{"\n"}}{{end}}' | sort | grep -v '^$' > /workspace/latest_rootfs.txt
        
        echo "Normalized Local Image Layers Array:"
        cat /workspace/latest_rootfs.txt

        echo "Docker inspect output for local image:"
        # FIXED: Points to the valid local tag reference created above
        docker inspect latest-local-build:test

  # Step 3: Loop through remote images, pull their true nested rootfs layers, and conditionally push
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'conditional-compare-and-push'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -e
        
        echo "Installing runtime dependencies (jq and docker)..."
        apt-get update -qq && apt-get install -y -qq jq docker.io > /dev/null

        # Clean up any line endings or carriage returns
        LOCAL_LAYERS=$$(cat /workspace/latest_rootfs.txt | tr -d '\r' | grep -v '^$$')
        if [ -z "$$LOCAL_LAYERS" ]; then
          echo "ERROR: Local layers file is empty."
          exit 1
        fi

        echo "Fetching existing remote image digests..."
        REMOTE_VERSIONS=$$(gcloud artifacts docker images list \
          ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE} \
          --sort-by=~CREATE_TIME \
          --limit=20 \
          --format='value(version)')
        
        FOUND_MATCH=false

        for VERSION in $$REMOTE_VERSIONS; do
          echo "Checking remote digest: $$VERSION"
          
          # MATCHED SPECIFICATION: Outputs a matching multi-line list with NO trailing commas
          REMOTE_LAYERS=$$(gcloud artifacts docker images describe "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_IMAGE}@$${VERSION}" \
            --format='json(image_summary.manifest)' 2>/dev/null | jq -r '.config.rootfs.diff_ids[]?' 2>/dev/null | tr -d '\r' | sort | grep -v '^$$')
          
          if [ -z "$$REMOTE_LAYERS" ]; then
            continue
          fi

          # Safe comparison of structurally matching multi-line blocks
          if [ "$$LOCAL_LAYERS" == "$$REMOTE_LAYERS" ]; then
            echo "--> ✅ MATCH FOUND: Remote digest $$VERSION has the exact same layer layout."
            FOUND_MATCH=true
            break
          fi
        done

        if [ "$$FOUND_MATCH" = true ]; then
          echo "=== RESULT: Image layers already exist in Registry. Skipping Docker Push step. ==="
        else
          echo "=== RESULT: Unique layer footprint detected. Executing push sequence... ==="
          
          # Re-tag the verified local reference back into the required full repository URI string path
          docker tag latest-local-build:test ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE}:${_TAG}
          
          gcloud auth configure-docker ${_REGION}-docker.pkg.dev --quiet
          docker push "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE}:${_TAG}"
        fi

  # Step 4: List all images in the repository for verification
  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'list-all-images'
    args:
      - 'artifacts'
      - 'docker'
      - 'images'
      - 'list'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE}'

  # Step 5: Inspect the final remote image to verify configuration stability
  - name: 'gcr.io/cloud-builders/docker'
    id: 'inspect-image'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        docker pull ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE}:${_TAG}
        echo "--- REMOTE LIVE ROOTFS LAYERS ---"
        docker inspect --format='{{json .RootFS.Layers}}' ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE}:${_TAG}

  # Step 6: Run functional tests
  - name: 'gcr.io/cloud-builders/docker'
    id: 'test-image'
    args: ['run', '--rm', '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE}:${_TAG}', 'echo', 'Tests passed']

logsBucket: 'gs://${_LOG_BUCKET}'
