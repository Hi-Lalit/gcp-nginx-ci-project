substitutions:
  _REGION: 'us-east1'
  _REPOSITORY: 'docker-repo'
  _IMAGE: 'nginx-app'
  _TAG: 'v1.05'
  _LOG_BUCKET: 'devops_ci_logs'

steps:

# Step 1: Build the image and save to a tarball (no push)
- name: 'gcr.io/kaniko-project/executor:latest'
  id: 'build-only'
  args:
    - --context=dir://app
    - --no-push
    - --tar-path=image.tar
    - --destination=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE}:${_TAG}
    - --cache=true
    - --cache-ttl=168h
    # Point this to a 'cache' folder in your repository
    - --cache-repo=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/cache
    - --reproducible=true

# Step 2: Push the tarball to the Artifact Registry
# 'crane' is highly recommended for this as it is fast and lightweight
- name: 'gcr.io/cloud-builders/docker'
  id: 'load-and-push'
  entrypoint: 'bash'
  args:
    - '-c'
    - |
      docker load -i image.tar
      docker push "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE}:${_TAG}"


# 2. List all images in the repository
- name: 'gcr.io/cloud-builders/gcloud'
  id: 'list-all-images'
  args:
  - 'artifacts'
  - 'docker'
  - 'images'
  - 'list'
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}'


# 3. Inspect the image to verify RootFS layers (Focusing on the layers list)
- name: 'gcr.io/cloud-builders/docker'
  id: 'inspect-image'
  entrypoint: 'bash'
  args:
    - '-c'
    - |
      docker pull ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE}:${_TAG}
      echo "--- ROOTFS LAYERS ---"
      docker inspect --format='{{json .RootFS.Layers}}' ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE}:${_TAG}

# 4. Run functional tests
- name: 'gcr.io/cloud-builders/docker'
  id: 'test-image'
  args: ['run', '--rm', '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE}:${_TAG}', 'echo', 'Tests passed']

logsBucket: 'gs://${_LOG_BUCKET}'