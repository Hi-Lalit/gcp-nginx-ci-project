substitutions:
  _REGION: 'us-east1'
  _REPOSITORY: 'docker-repo'
  _IMAGE: 'nginx-app'
  _TAG: 'v1.01'
  _LOG_BUCKET: 'devops_ci_logs'

steps:
- name: gcr.io/google.com/cloudsdktool/cloud-sdk
  entrypoint: bash
  args:
  - '-c'
  - |
    Digest_list=$(gcloud artifacts docker images list ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY} --format='get(DIGEST)')

    echo "Digest_list:"
    echo "${Digest_list}"

logsBucket: 'gs://${_LOG_BUCKET}'