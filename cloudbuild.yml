substitutions:
  _REGION: 'us-east1'
  _REPOSITORY: 'docker-repo'
  _IMAGE: 'nginx-app'
  _TAG: 'v1.05'
  _LOG_BUCKET: 'devops_ci_logs'
  

steps:

# Step 1: Build the image and save to a tarball (no push)
- name: 'gcr.io/kaniko-project/executor:latest'
  id: 'build-only'
  args:
    - --context=dir://app
    - --no-push
    - --tar-path=/workspace/image.tar
    - --destination=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE}:${_TAG}
    - --cache=true
    - --cache-ttl=168h
    # Point this to a 'cache' folder in your repository
    - --cache-repo=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/cache
    - --reproducible=true

# Step 2: Load image into Docker
- name: 'gcr.io/cloud-builders/docker'
  id: 'load-image'
  entrypoint: 'bash'
  args:
    - '-c'
    - |
      docker load -i /workspace/image.tar
      
      docker inspect ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE}:${_TAG} | jq -r '.[] | .RootFS.Layers | sort | join(" ")' > /workspace/latest_rootfs.txt

      echo "Latest Image Digest:"
      cat /workspace/latest_rootfs.txt

- name: gcr.io/google.com/cloudsdktool/cloud-sdk
  id: 'list-existing-rootfs-of-images'
  entrypoint: bash
  args:
  - '-c'
  - |
    # Ensure the output directory exists and clear old contents
    mkdir -p /workspace
    > /workspace/repo_rootfs.txt

    # Step 1: Loop through each image version fetched from Artifact Registry
    for VERSION in $(gcloud artifacts docker images list ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY} --format='value(version)'); do
        
        # Construct the full remote image URI using the digest/version
        IMAGE_URI="${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_IMAGE}:${_TAG}"
        
        # Step 2: Use docker manifest to read remote layers without downloading the whole image
        # Extract layers, sort them, join them with a space, and append to the text file
        docker manifest inspect "$$IMAGE_URI" 2>/dev/null | jq -r '
          if .layers then 
            [.layers[].digest] | sort | join(" ") 
          else 
            empty 
          fi
        ' >> /workspace/repo_rootfs.txt

    done

    # Step 3: Sort the final output file so identical layer sets align perfectly
    sort -o /workspace/repo_rootfs.txt /workspace/repo_rootfs.txt


# Step 3: Push the tarball to the Artifact Registry
- name: 'gcr.io/cloud-builders/docker'
  id: 'conditional-push'
  entrypoint: 'bash'
  args:
    - '-c'
    - |
      set -e
      set -o pipefail

      # Use a standard variable reference format, strip trailing whitespace
      Target_Image=$$(cat /workspace/latest_rootfs.txt | xargs)

      echo "Target Image Digest: $$Target_Image"
      
      # Fail-safe check: Do not run grep if the target image layer definition is empty
      if [ -z "$$Target_Image" ]; then
        echo "Error: Target image layers file is empty. Cannot verify."
        exit 1
      fi

      found=false

      # Use -x for whole line match, and -F to treat input as literal text patterns
      if grep -qx -F "$$Target_Image" /workspace/repo_rootfs.txt; then
        echo "An identical image already exists in the repository. Skipping push."
        found=true
      else
        echo "No identical image found in the repository. Proceeding to push."
      fi

      if [ "$$found" = false ]; then
        echo "Pushing new image to Artifact Registry..."        
        docker push "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE}:${_TAG}"
      fi


# Step 4: List all images in the repository
- name: 'gcr.io/cloud-builders/gcloud'
  id: 'list-all-images'
  args:
  - 'artifacts'
  - 'docker'
  - 'images'
  - 'list'
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}'

# Step 5: Inspect the image to verify RootFS layers (Focusing on the layers list)
- name: 'gcr.io/cloud-builders/docker'
  id: 'inspect-image'
  entrypoint: 'bash'
  args:
    - '-c'
    - |
      docker pull ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE}:${_TAG}
      echo "--- ROOTFS LAYERS ---"
      docker inspect --format='{{json .RootFS.Layers}}' ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE}:${_TAG}

# Step 6: Run functional tests
- name: 'gcr.io/cloud-builders/docker'
  id: 'test-image'
  args: ['run', '--rm', '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE}:${_TAG}', 'echo', 'Tests passed']

logsBucket: 'gs://${_LOG_BUCKET}'