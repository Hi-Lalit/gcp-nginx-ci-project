substitutions:
  _REGION: 'us-east1'
  _REPOSITORY: 'docker-repo'
  _IMAGE: 'nginx-app'
  _TAG: 'v1.05'
  _LOG_BUCKET: 'devops_ci_logs'
  

steps:

# Step 1: Build the image and save to a tarball (no push)
- name: 'gcr.io/kaniko-project/executor:latest'
  id: 'build-only'
  args:
    - --context=dir://app
    - --no-push
    - --tar-path=/workspace/image.tar
    - --destination=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE}:${_TAG}
    - --cache=true
    - --cache-ttl=168h
    # Point this to a 'cache' folder in your repository
    - --cache-repo=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/cache
    - --reproducible=true

# Step 2: Load image into Docker
- name: 'gcr.io/cloud-builders/docker'
  id: 'load image'
  entrypoint: 'bash'
  args:
    - '-c'
    - |
      docker load -i /workspace/image.tar

      apt-get update -qq && apt-get install -y -qq jq

      docker inspect ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE}:${_TAG}
      
      echo "Extracting RootFS layers and saving to latest_rootfs.txt"

      docker inspect ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE}:${_TAG} | jq -r '.[] | .RootFS.Layers | sort | join(" ")' > /workspace/latest_rootfs.txt

      echo "Latest Image Digest:"
      cat /workspace/latest_rootfs.txt

# Step 3: List existing RootFS layers of images in the repository
- name: gcr.io/google.com/cloudsdktool/cloud-sdk
  id: 'list-existing-rootfs-of-images'
  entrypoint: bash
  args:
  - '-c'
  - |

    echo "Getting Id of all images in the repository"

    gcloud artifacts docker images list ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY} --format="value(version)" > /workspace/image_ids.txt

    echo "Image IDs in the repository:"

    Image_IDs=$(cat /workspace/image_ids.txt)
    
    for image_id in $Image_IDs; do
      docker inspect $image_id | jq -r '.[] | .RootFS.Layers | sort | join(" ")' >> /workspace/existing_rootfs.txt
    done

    echo "Existing RootFS layers in the repository:"
    cat /workspace/existing_rootfs.txt

  

logsBucket: 'gs://${_LOG_BUCKET}'