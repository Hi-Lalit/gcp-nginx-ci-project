steps:
- name: 'gcr.io/cloud-builders/docker'
  dir: 'app'
  args: ['build', '-t', 'us-east1-docker.pkg.dev/$PROJECT_ID/docker-repo/nginx-app:v1.01', '.']

- name: 'gcr.io/cloud-builders/docker'
  args: ['push', 'us-east1-docker.pkg.dev/$PROJECT_ID/docker-repo/nginx-app:v1.01']

- name: 'us-east1-docker.pkg.dev/$PROJECT_ID/docker-repo/nginx-app:v1.01'
  entrypoint: '/bin/sh'
  args: ['Hostname is', '-c', 'hostname', ]

- name: 'gcr.io/cloud-builders/docker'
  args: ['Run the container and display its hostname', '-c', 'run', '--rm', 'us-east1-docker.pkg.dev/$PROJECT_ID/docker-repo/nginx-app:v1.01', 'hostname']

logsBucket: 'gs://devops_ci_logs'