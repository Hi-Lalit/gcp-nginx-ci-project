substitutions:
  _REGION: 'us-east1'
  _REPOSITORY: 'docker-repo'
  _IMAGE: 'nginx-app'
  _TAG: 'v1.05'
  _LOG_BUCKET: 'devops_ci_logs'
  

steps:

# Step 1: Build the image and save to a tarball (no push)
- name: 'gcr.io/kaniko-project/executor:latest'
  id: 'build-only'
  args:
    - --context=dir://app
    - --no-push
    - --tar-path=/workspace/image.tar
    - --destination=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE}:${_TAG}
    - --cache=true
    - --cache-ttl=168h
    # Point this to a 'cache' folder in your repository
    - --cache-repo=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/cache
    - --reproducible=true

# Step 2: Load image into Docker
- name: 'gcr.io/cloud-builders/docker'
  id: 'load image'
  entrypoint: 'bash'
  args:
    - '-c'
    - |
      docker load -i /workspace/image.tar

      apt-get update -qq && apt-get install -y -qq jq

      docker inspect ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE}:${_TAG}
      
      echo "Extracting RootFS layers and saving to latest_rootfs.txt"

      docker inspect ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE}:${_TAG} | jq -r '.[] | .RootFS.Layers | sort | join(" ")' > /workspace/latest_rootfs.txt

      echo "Latest Image Digest:"
      latest_digest=$(cat /workspace/latest_rootfs.txt)
      echo "$latest_digest"

# Step 3: List existing RootFS layers of images in the repository
- name: gcr.io/google.com/cloudsdktool/cloud-sdk
  id: 'Getting the RootFS layers of existing images in the repository'
  entrypoint: bash
  args:
  - '-c'
  - |
    apt-get update -qq && apt-get install -y -qq jq docker.io

    echo "Getting full image references of all images in the repository"

    gcloud artifacts docker images list ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY} \
      --format="value(format('{0}@{1}', package, version))" > /workspace/image_refs.txt

    echo "Image references in the repository:"
    cat /workspace/image_refs.txt

    while IFS= read -r image_ref; do
      echo "Pulling $image_ref"
      docker pull "$image_ref"
      docker inspect "$image_ref" | jq -r '.[] | .RootFS.Layers | sort | join(" ")' >> /workspace/repo_rootfs.txt
    done < /workspace/image_refs.txt

    echo "Existing RootFS layers in the repository:"
    repo_rootfs=$(cat /workspace/repo_rootfs.txt)
    echo "$repo_rootfs"

- name: 'gcr.io/cloud-builders/docker'
  id: 'Compare RootFS layers'
  entrypoint: 'bash'
  args:
    - '-c'
    - |
      apt-get update -qq && apt-get install -y -qq jq

      echo "Comparing RootFS layers of the new image with existing images in the repository"

      latest_digest=$(cat /workspace/latest_rootfs.txt)
      repo_digests=$(cat /workspace/repo_rootfs.txt)

      if echo "$repo_digests" | grep -qFx "$latest_digest"; then
        echo "An image with the same RootFS layers already exists. Skipping push."
      else
        echo "No matching RootFS layers found. Pushing new image."
        docker push ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE}:${_TAG}
      fi


logsBucket: 'gs://${_LOG_BUCKET}'