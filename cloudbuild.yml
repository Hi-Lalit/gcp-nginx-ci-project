substitutions:
  _REGION: 'us-east1'
  _REPOSITORY: 'docker-repo'
  _IMAGE: 'nginx-app'
  _LOG_BUCKET: 'devops_ci_logs'

steps:

# Step 1: List all images currently in the repository
- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  id: 'List repository images'
  entrypoint: 'bash'
  args:
    - '-c'
    - |
      set -e

      echo "----------------------------------------------------------------------------------------------------------"
      echo "Listing all images in the repository"
      echo "----------------------------------------------------------------------------------------------------------"

      gcloud artifacts docker images list ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY} \
        --format="value(format('{0}@{1}', package, version))" > /workspace/image_refs.txt

      gcloud artifacts docker tags list ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE} --format="value(tag)" > /workspace/image_tags.txt

      echo "Image references found:"
      cat /workspace/image_refs.txt

      echo "Image tags found:"
      cat /workspace/image_tags.txt

      data=$$(cat /workspace/image_tags.txt 2>/dev/null)

      # 2. Check if the file is missing or the variable is empty
      if [ -z "$$data" ]; then
          echo "Tag file is empty or missing."
          updated_tag="v1.01"
          echo "Using first tag: $${updated_tag}"
                    
      else
          # Remove 'v' prefix if it exists in the file to perform math
          clean_data=$$(echo "$data" | sed 's/^v//')
          
          echo "Last Version tag: $data"
          
          # 3. Calculate new tag using awk
          incremented_num=$$(awk "BEGIN {printf \"%.2f\", $clean_data + 0.01}")
          
          # 4. Re-attach the 'v' prefix
          updated_tag="v$${incremented_num}"
          echo "Updated tag: $${updated_tag}"
      fi

      echo "$${updated_tag}" > /workspace/updated_tag.txt


# Step 2: Build the image and save to a tarball (no push)
- name: 'gcr.io/kaniko-project/executor:debug'
  id: 'Build image'
  entrypoint: 'sh'
  args:
    - '-c'
    - |
      echo "----------------------------------------------------------------------------------------------------------"
      echo "Building the image with Kaniko and saving to tarball (no push)"
      echo "----------------------------------------------------------------------------------------------------------"
      NEW_TAG=$$(cat /workspace/updated_tag.txt)

      /kaniko/executor --context=dir://app \
        --no-push \
        --tar-path=/workspace/image.tar \
        --destination=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE}:$$NEW_TAG \
        --cache=true \
        --cache-ttl=168h \
        --cache-repo=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/cache \
        --reproducible=true

# Step 3: Load image into Docker, extract RootFS layers, run tests
- name: 'gcr.io/cloud-builders/docker'
  id: 'Load, inspect & test image'
  entrypoint: 'bash'
  args:
    - '-c'
    - |
      set -e

      NEW_TAG=$$(cat /workspace/updated_tag.txt)

      echo "----------------------------------------------------------------------------------------------------------"
      echo "Loading the built image from tarball into Docker"
      echo "----------------------------------------------------------------------------------------------------------"
      docker load -i /workspace/image.tar

      apt-get update -qq && apt-get install -y -qq jq

      echo "Extracting RootFS layers and saving to latest_rootfs.txt"
      docker inspect ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE}:$$NEW_TAG \
        | jq -r '.[] | .RootFS.Layers | join(" ")' > /workspace/latest_rootfs.txt

      echo "Latest image RootFS layers:"
      cat /workspace/latest_rootfs.txt

      echo "----------------------------------------------------------------------------------------------------------"
      echo "Testing the image by running a container"
      echo "----------------------------------------------------------------------------------------------------------"
      docker run --rm ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE}:$$NEW_TAG \
        echo "Container is running successfully"



# Step 4: Extract RootFS layers of existing repository images using crane
- name: 'gcr.io/go-containerregistry/crane:debug'
  id: 'Extract RootFS layers of repository images'
  entrypoint: 'sh'
  args:
    - '-c'
    - |
      set -e

      echo "----------------------------------------------------------------------------------------------------------"
      echo "Extracting RootFS layers of repository images using crane"
      echo "----------------------------------------------------------------------------------------------------------"

      : > /workspace/repo_rootfs.txt
      
      while IFS= read -r image_ref; do
        [ -z "$image_ref" ] && continue
        echo "Inspecting image: $image_ref"

        raw=$(crane config "$image_ref") || {
          echo "WARNING: crane config failed for $image_ref" >&2
          continue
        }

        layers=$(echo "$raw" \
          | grep -o '"diff_ids":\[[^]]*\]' \
          | grep -o '"sha256:[a-f0-9]*"' \
          | tr -d '"' \
          | tr '\n' ' ' \
          | xargs)

        if [ -z "$layers" ]; then
          echo "WARNING: No layers found for $image_ref" >&2
          continue
        fi

        echo "  -> Layers: $layers"
        echo "$layers" >> /workspace/repo_rootfs.txt
      done < /workspace/image_refs.txt

      echo "RootFS layers of repository images:"
      cat /workspace/repo_rootfs.txt

# Step 5: Compare RootFS layers and conditionally push
- name: 'gcr.io/cloud-builders/docker'
  id: 'Conditional push'
  entrypoint: 'bash'
  args:
    - '-c'
    - |
      set -e

      echo "----------------------------------------------------------------------------------------------------------"
      echo "Comparing RootFS layers of new image with existing repository images"
      echo "----------------------------------------------------------------------------------------------------------"

      # Load variables

      NEW_TAG=$(cat /workspace/updated_tag.txt)

      NEW_ROOTFS=$(cat /workspace/latest_rootfs.txt)

      REPO_ROOTFS="/workspace/repo_rootfs.txt"

      FULL_IMAGE_NAME="${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_IMAGE}:${NEW_TAG}"

      NEW_TAG=$$(cat /workspace/updated_tag.txt)

      # 1. Validate that the new RootFS data is not empty before proceeding

      if [[ -z "$NEW_ROOTFS" ]]; then
        echo "ERROR: latest_rootfs.txt is empty. Cannot compare." >&2
        exit 1
      fi


      if [[ ! -s "$REPO_ROOTFS" ]]; then
        echo "WARNING: repo_rootfs.txt is empty or missing. No existing images to compare against." >&2
        echo "Proceeding to push the new image without comparison."
        docker push ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE}:$$NEW_TAG
        exit 0
      fi
      
      # 2. Compare layers using grep
      # -F: Fixed string (not regex)
      # -x: Match whole line exactly
      # -q: Quiet mode (returns 0 if found, 1 if not)

      if grep -Fxq "$NEW_ROOTFS" "$REPO_ROOTFS"; then
          echo "MATCH FOUND: An image with these identical layers already exists."
          echo "Action: Skipping push for $NEW_TAG."
        else
          echo "NO MATCH: This is a unique build."
          echo "Action: Pushing $FULL_IMAGE_NAME"
          docker push "$FULL_IMAGE_NAME"
        fi

logsBucket: 'gs://${_LOG_BUCKET}'